<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Together — Co-Browse</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e10; --surface: #18181c; --border: #2a2a30;
    --accent: #c8f04a; --accent2: #f04aaa; --text: #e8e8e4;
    --muted: #7a7a82; --bar-h: 58px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  #bar { height: var(--bar-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; padding: 0 16px; flex-shrink: 0; z-index: 10; }
  #logo { font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.15rem; color: var(--accent); white-space: nowrap; letter-spacing: -0.02em; }
  #logo span { color: var(--accent2); font-style: italic; }
  #url-form { flex: 1; display: flex; gap: 8px; align-items: center; }
  #url-input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.8rem; padding: 7px 12px; border-radius: 6px; outline: none; transition: border-color .2s; }
  #url-input:focus { border-color: var(--accent); }
  #url-input::placeholder { color: var(--muted); }
  #go-btn { background: var(--accent); color: #0e0e10; border: none; font-family: 'DM Mono', monospace; font-size: 0.8rem; font-weight: 500; padding: 7px 16px; border-radius: 6px; cursor: pointer; transition: opacity .15s; white-space: nowrap; }
  #go-btn:hover { opacity: .85; }
  #room-info { display: flex; align-items: center; gap: 6px; font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
  #room-id-badge { background: var(--border); padding: 3px 8px; border-radius: 4px; color: var(--text); cursor: pointer; transition: background .15s; }
  #room-id-badge:hover { background: #38383f; }
  #copy-hint { font-size: 0.68rem; color: var(--accent); opacity: 0; transition: opacity .3s; }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; flex-shrink: 0; transition: background .3s; }
  #status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  #peer-count { font-size: 0.72rem; color: var(--muted); }
  #lobby { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; text-align: center; padding: 32px; position: relative; overflow: hidden; }
  #lobby::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 40% at 30% 50%, rgba(200,240,74,.06) 0%, transparent 70%), radial-gradient(ellipse 50% 35% at 75% 55%, rgba(240,74,170,.05) 0%, transparent 70%); pointer-events: none; }
  #lobby h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: clamp(2rem, 5vw, 3.5rem); line-height: 1.1; letter-spacing: -0.03em; }
  #lobby h1 em { font-style: italic; color: var(--accent); }
  #lobby p { color: var(--muted); font-size: 0.85rem; max-width: 380px; line-height: 1.6; }
  #share-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 420px; }
  #share-box label { font-size: 0.72rem; color: var(--muted); }
  #share-link-row { display: flex; gap: 8px; align-items: center; }
  #share-link { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 6px 10px; border-radius: 5px; outline: none; cursor: text; }
  #copy-link-btn { background: transparent; border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 6px 12px; border-radius: 5px; cursor: pointer; transition: border-color .15s, color .15s; }
  #copy-link-btn:hover { border-color: var(--accent); color: var(--accent); }
  #viewport-wrap { flex: 1; position: relative; overflow: hidden; display: none; }
  #viewport-wrap.active { display: block; }
  #page-frame { width: 100%; height: 100%; border: none; display: block; }
  #mouse-overlay { position: absolute; inset: 0; z-index: 5; cursor: none; }
  .r-cursor { position: absolute; pointer-events: none; z-index: 20; transform: translate(-2px, -2px); transition: left .06s linear, top .06s linear; }
  .r-cursor svg { display: block; }
  .r-cursor-label { position: absolute; left: 18px; top: 2px; font-size: 0.65rem; font-family: 'DM Mono', monospace; background: var(--surface); padding: 2px 6px; border-radius: 4px; white-space: nowrap; border: 1px solid var(--border); }
  #local-cursor { position: absolute; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); pointer-events: none; z-index: 20; transform: translate(-50%, -50%); transition: left .03s, top .03s; }
  .ripple { position: absolute; width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--accent); pointer-events: none; z-index: 25; transform: translate(-50%, -50%) scale(0); animation: ripple-anim .4s ease-out forwards; }
  @keyframes ripple-anim { to { transform: translate(-50%,-50%) scale(1.8); opacity: 0; } }
  #loading-bar { position: absolute; top: 0; left: 0; height: 3px; background: var(--accent); width: 0%; transition: width .3s ease; z-index: 30; display: none; }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 0.78rem; padding: 8px 18px; border-radius: 8px; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; z-index: 100; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="bar">
  <div id="logo">to<span>gether</span></div>
  <div id="url-form">
    <input id="url-input" type="text" placeholder="https://example.com" autocomplete="off" spellcheck="false" />
    <button id="go-btn">Go</button>
  </div>
  <div id="room-info">
    <div id="status-dot"></div>
    <span id="peer-count">0 peers</span>
    &nbsp;|&nbsp; room:
    <span id="room-id-badge" title="Click to copy room link">–</span>
    <span id="copy-hint">copied!</span>
  </div>
</div>
<div id="lobby">
  <h1>Browse the web<br/><em>together.</em></h1>
  <p>Share the link below with your partner. Once you're both here, type a URL above and explore together — both cursors visible, both in control.</p>
  <div id="share-box">
    <label>Your room link — send this to your partner</label>
    <div id="share-link-row">
      <input id="share-link" type="text" readonly />
      <button id="copy-link-btn">Copy</button>
    </div>
  </div>
</div>
<div id="viewport-wrap">
  <div id="loading-bar"></div>
  <iframe id="page-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  <div id="mouse-overlay"></div>
  <div id="local-cursor"></div>
</div>
<div id="toast"></div>
<script>
let roomId = location.hash.slice(1);
if (!roomId) { roomId = Math.random().toString(36).slice(2, 8); location.hash = roomId; }
const urlInput = document.getElementById('url-input');
const goBtn = document.getElementById('go-btn');
const lobby = document.getElementById('lobby');
const viewWrap = document.getElementById('viewport-wrap');
const frame = document.getElementById('page-frame');
const overlay = document.getElementById('mouse-overlay');
const localCursor = document.getElementById('local-cursor');
const loadingBar = document.getElementById('loading-bar');
const statusDot = document.getElementById('status-dot');
const peerCount = document.getElementById('peer-count');
const roomBadge = document.getElementById('room-id-badge');
const copyHint = document.getElementById('copy-hint');
const shareLink = document.getElementById('share-link');
const copyLinkBtn = document.getElementById('copy-link-btn');
const toast = document.getElementById('toast');
roomBadge.textContent = roomId;
const roomUrl = `${location.origin}${location.pathname}#${roomId}`;
shareLink.value = roomUrl;
let toastTimer;
function showToast(msg) { toast.textContent = msg; toast.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(() => toast.classList.remove('show'), 2000); }
roomBadge.addEventListener('click', () => { navigator.clipboard.writeText(roomUrl).then(() => { copyHint.style.opacity = '1'; setTimeout(() => copyHint.style.opacity = '0', 1500); }); });
copyLinkBtn.addEventListener('click', () => { navigator.clipboard.writeText(roomUrl).then(() => showToast('Room link copied!')); });
const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${proto}://${location.host}?room=${roomId}`);
function updatePeers(n) { peerCount.textContent = `${n} peer${n !== 1 ? 's' : ''}`; }
ws.addEventListener('open', () => statusDot.classList.add('online'));
ws.addEventListener('close', () => statusDot.classList.remove('online'));
const remoteCursors = {};
ws.addEventListener('message', (e) => {
  const msg = JSON.parse(e.data);
  if (msg.type === 'cursor_move') {
    let el = remoteCursors[msg.userId];
    if (!el) {
      el = document.createElement('div'); el.className = 'r-cursor';
      el.innerHTML = `<svg width="16" height="20" viewBox="0 0 16 20" fill="none"><path d="M0 0 L0 16 L4.5 12 L7.5 19 L9.5 18 L6.5 11 L12 11 Z" fill="${msg.color}" stroke="#0e0e10" stroke-width="1"/></svg><div class="r-cursor-label" style="color:${msg.color}">${msg.userId}</div>`;
      viewWrap.appendChild(el); remoteCursors[msg.userId] = el;
      updatePeers(Object.keys(remoteCursors).length);
    }
    el.style.left = (msg.x * viewWrap.clientWidth) + 'px';
    el.style.top = (msg.y * viewWrap.clientHeight) + 'px';
  }
  if (msg.type === 'cursor_click') {
    const ripple = document.createElement('div'); ripple.className = 'ripple';
    ripple.style.left = (msg.x * viewWrap.clientWidth) + 'px';
    ripple.style.top = (msg.y * viewWrap.clientHeight) + 'px';
    ripple.style.borderColor = msg.color;
    viewWrap.appendChild(ripple); setTimeout(() => ripple.remove(), 500);
  }
  if (msg.type === 'cursor_leave') { if (remoteCursors[msg.userId]) { remoteCursors[msg.userId].remove(); delete remoteCursors[msg.userId]; updatePeers(Object.keys(remoteCursors).length); } }
  if (msg.type === 'url_change') loadPage(msg.url, false);
  if (msg.type === 'scroll') frame.contentWindow?.scrollTo?.(msg.sx, msg.sy);
});
function send(obj) { if (ws.readyState === 1) ws.send(JSON.stringify(obj)); }
overlay.addEventListener('mousemove', (e) => {
  const rect = viewWrap.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;
  localCursor.style.left = (x * rect.width) + 'px';
  localCursor.style.top = (y * rect.height) + 'px';
  send({ type: 'cursor_move', x, y });
});
overlay.addEventListener('click', (e) => {
  const rect = viewWrap.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;
  send({ type: 'cursor_click', x, y });
  const iw = frame.contentWindow;
  if (iw) { const el = iw.document.elementFromPoint(x * frame.clientWidth, y * frame.clientHeight); if (el) el.click(); }
});
function loadPage(url, broadcast = true) {
  if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
  urlInput.value = url; lobby.style.display = 'none'; viewWrap.classList.add('active');
  loadingBar.style.display = 'block'; loadingBar.style.width = '0%';
  setTimeout(() => loadingBar.style.width = '70%', 50);
  frame.src = `/proxy?url=${encodeURIComponent(url)}`;
  frame.onload = () => { loadingBar.style.width = '100%'; setTimeout(() => { loadingBar.style.width = '0%'; loadingBar.style.display = 'none'; }, 400); };
  if (broadcast) send({ type: 'url_change', url });
}
goBtn.addEventListener('click', () => loadPage(urlInput.value.trim()));
urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loadPage(urlInput.value.trim()); });
</script>
</body>
</html>
